<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TROPOMI NO2 Timelapse</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar" class="sidebar open">
    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
      <span class="chevron"></span>
    </button>
    <div class="sidebar-content">
      <h1>Sentinel-5P NO<sub>2</sub> Monthly Averages</h1>
      <p class="subtitle">Tropospheric column density from TROPOMI</p>
      <p id="mode-note" class="mode-note"></p>

      <div class="control-group">
        <label>Projection</label>
        <div class="button-group">
          <button id="btn-flat" class="btn active">Flat</button>
          <button id="btn-globe" class="btn">Globe</button>
        </div>
      </div>

      <div class="control-group">
        <label>Base Map</label>
        <div class="button-group">
          <button id="btn-dark" class="btn active">Dark</button>
          <button id="btn-satellite" class="btn">Satellite</button>
        </div>
      </div>

      <div class="control-group">
        <label>NO<sub>2</sub> Column Density</label>
        <div class="legend">
          <div class="legend-gradient"></div>
          <div class="legend-labels">
            <span>0</span>
            <span>75</span>
            <span>150 &micro;mol/m&sup2;</span>
          </div>
        </div>
      </div>

      <div class="control-group">
        <label>Overlay</label>
        <div class="button-group">
          <button id="toggle-cities" class="btn" aria-pressed="false">Cities</button>
        </div>
      </div>

      <div class="control-group">
        <label>Share</label>
        <div class="button-group">
          <button id="btn-share" class="btn" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
            <span id="share-text">Copy Link</span>
          </button>
        </div>
      </div>

      <div class="credits">
        <p>Data: <a href="https://terrascope.be" target="_blank">Terrascope</a> / ESA Sentinel-5P TROPOMI</p>
        <p>Cities: <a href="https://simplemaps.com/data/world-cities" target="_blank">Simplemaps</a> (CC BY 4.0)</p>
        <p>Basemaps: <a href="https://carto.com/basemaps" target="_blank">CARTO</a> / <a href="https://www.esri.com" target="_blank">Esri</a></p>
        <p>Built with <a href="https://maplibre.org" target="_blank">MapLibre GL JS</a></p>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <div class="controls">
      <button id="btn-prev" class="ctrl-btn" aria-label="Previous month">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M10 3L5 8l5 5V3z"/>
        </svg>
      </button>
      <button id="btn-play" class="ctrl-btn play-btn" aria-label="Play / pause">
        <svg id="icon-play" width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
          <path d="M4 2l10 6-10 6V2z"/>
        </svg>
        <svg id="icon-pause" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" style="display:none">
          <path d="M3 2h3v12H3zM10 2h3v12h-3z"/>
        </svg>
      </button>
      <button id="btn-next" class="ctrl-btn" aria-label="Next month">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M6 3l5 5-5 5V3z"/>
        </svg>
      </button>
      <select id="speed-select" class="speed-select" aria-label="Playback speed">
        <option value="1500">0.5x</option>
        <option value="750" selected>1.0x</option>
        <option value="400">2.0x</option>
        <option value="200">4.0x</option>
      </select>
      <span class="month-picker">
        <span id="month-label" class="month-label">Loading...</span>
        <select id="month-select" class="month-select" aria-label="Jump to month"></select>
      </span>
    </div>
    <div class="timeline-wrap">
      <div id="timeline-buffer" class="timeline-buffer"></div>
      <div id="timeline-range-band" class="timeline-range-band"></div>
      <input type="range" id="range-start" class="range-handle" min="0" max="0" value="0" step="1" aria-label="Playback range start">
      <input type="range" id="range-end" class="range-handle" min="0" max="0" value="0" step="1" aria-label="Playback range end">
      <input type="range" id="timeline" min="0" max="0" value="0" step="1">
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@4.3.0/dist/pmtiles.js"></script>
  <script src="app.js"></script>
</body>
</html>
